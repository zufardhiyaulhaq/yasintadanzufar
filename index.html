<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Yasinta & Zufar</title>

    <!-- SEO & Social -->
    <meta name="description" content="Undangan Pernikahan Yasinta & Zufar" />
    <link rel="canonical" href="https://withjoy.com/zufar-and-yasinta/" />
    <meta property="og:title" content="Yasinta & Zufar" />
    <meta property="og:description" content="Undangan Pernikahan Yasinta & Zufar" />
    <meta property="og:url" content="https://withjoy.com/zufar-and-yasinta/" />
    <meta property="og:type" content="website" />

    <!-- Fastest redirect: JS (fires before meta refresh) -->
    <script>
      (function () {
        var target = "https://withjoy.com/zufar-and-yasinta/";
        // Preserve any query string from the incoming URL
        if (window.location.search) {
          target +=
            (target.indexOf("?") === -1 ? "?" : "&") +
            window.location.search.substring(1);
        }
        // Preserve hash
        if (window.location.hash) {
          target += window.location.hash;
        }
        window.location.replace(target);
      })();
    </script>

    <!-- Fallback: meta refresh (works if JS is disabled) -->
    <meta http-equiv="refresh" content="0; url=https://withjoy.com/zufar-and-yasinta/" />

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap');

      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Cormorant Garamond', Georgia, serif;
        background: #faf8f5;
        color: #3d3229;
        overflow: hidden;
      }

      .container {
        text-align: center;
        animation: fadeIn 0.4s ease-out;
      }

      .names {
        font-size: clamp(2rem, 6vw, 3.5rem);
        font-weight: 300;
        letter-spacing: 0.15em;
        font-style: italic;
        color: #6b5c4c;
      }

      .ampersand {
        display: block;
        font-size: clamp(1.2rem, 3vw, 1.8rem);
        font-weight: 300;
        color: #b8a898;
        margin: 0.2em 0;
        letter-spacing: 0.3em;
      }

      .loading {
        margin-top: 2rem;
        font-size: 0.85rem;
        letter-spacing: 0.25em;
        text-transform: uppercase;
        color: #b8a898;
        animation: pulse 1.5s ease-in-out infinite;
      }

      .fallback {
        margin-top: 1.5rem;
      }

      .fallback a {
        font-size: 0.9rem;
        color: #8b7a6b;
        text-decoration: none;
        border-bottom: 1px solid #d4c8bc;
        padding-bottom: 2px;
        letter-spacing: 0.08em;
        transition: color 0.3s, border-color 0.3s;
      }

      .fallback a:hover {
        color: #3d3229;
        border-color: #3d3229;
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes pulse {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 1; }
      }
    </style>
  </head>
  <body>
    <noscript>
      <meta http-equiv="refresh" content="0; url=https://withjoy.com/zufar-and-yasinta/" />
    </noscript>
    <div class="container">
      <div class="names">
        Yasinta
        <span class="ampersand">&amp;</span>
        Zufar
      </div>
      <div class="loading">Memuat&hellip;</div>
      <div class="fallback">
        <a href="https://withjoy.com/zufar-and-yasinta/">Klik di sini jika tidak dialihkan</a>
      </div>
    </div>
  </body>
</html>
