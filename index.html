<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Yasinta & Zufar</title>

    <meta name="description" content="Undangan Pernikahan Yasinta & Zufar" />
    <link rel="canonical" href="https://withjoy.com/zufar-and-yasinta/" />
    <meta property="og:title" content="Yasinta & Zufar" />
    <meta property="og:description" content="Undangan Pernikahan Yasinta & Zufar" />
    <meta property="og:url" content="https://yasintadanzufar.com" />
    <meta property="og:type" content="website" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Gilda+Display&family=Lato:wght@300;400&display=swap" rel="stylesheet" />

    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

      :root {
        --cream: #faf8f4;
        --warm-dark: #3d3229;
        --gold: #b8976a;
        --gold-light: #d4c4a8;
        --soft-brown: #6b5c4c;
        --muted: #b8a898;
      }

      body {
        font-family: 'Gilda Display', Georgia, serif;
        background: var(--cream);
        color: var(--warm-dark);
        overflow: hidden;
        height: 100vh;
        width: 100vw;
      }

      /* ====== WELCOME SCREEN ====== */
      .welcome-screen {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--cream);
      }

      .welcome-bg {
        position: absolute;
        inset: 0;
        background:
          radial-gradient(ellipse at 20% 50%, rgba(184, 151, 106, 0.08) 0%, transparent 50%),
          radial-gradient(ellipse at 80% 20%, rgba(184, 151, 106, 0.06) 0%, transparent 40%),
          radial-gradient(ellipse at 50% 80%, rgba(184, 151, 106, 0.04) 0%, transparent 60%);
      }

      /* ====== KING PROTEA MOTIFS ====== */
      .motif {
        position: absolute;
        z-index: 1;
        pointer-events: none;
        opacity: 0;
        animation: motifFadeIn 1.6s ease-out forwards;
      }

      .motif img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      .motif-top-right {
        top: -2%;
        right: -2%;
        width: clamp(180px, 30vw, 360px);
        height: auto;
        animation-delay: 0.3s;
      }

      .motif-bottom-left {
        bottom: -2%;
        left: -2%;
        width: clamp(180px, 30vw, 360px);
        height: auto;
        animation-delay: 0.5s;
      }

      @keyframes motifFadeIn {
        from { opacity: 0; }
        to { opacity: 0.7; }
      }

      /* ====== WELCOME CONTENT ====== */
      .welcome-content {
        position: relative;
        z-index: 2;
        text-align: center;
        animation: welcomeFadeIn 1.2s ease-out;
      }

      .welcome-dear {
        font-family: 'Lato', sans-serif;
        font-weight: 300;
        font-size: 0.85rem;
        letter-spacing: 0.2em;
        color: var(--soft-brown);
        margin-bottom: 2rem;
        display: none;
      }

      .welcome-dear.visible {
        display: block;
      }

      .welcome-label {
        font-family: 'Lato', sans-serif;
        font-weight: 300;
        font-size: 0.7rem;
        letter-spacing: 0.45em;
        text-transform: none;
        color: var(--muted);
        margin-bottom: 1.8rem;
      }

      .welcome-names {
        font-weight: 400;
        font-style: normal;
        font-size: clamp(2.6rem, 8vw, 4.8rem);
        color: var(--soft-brown);
        line-height: 1.2;
        letter-spacing: 0.03em;
      }

      .welcome-ampersand {
        display: block;
        font-size: clamp(1.2rem, 3.5vw, 1.8rem);
        font-weight: 400;
        color: var(--gold);
        margin: 0.2em 0;
        letter-spacing: 0.4em;
        font-style: normal;
      }

      .divider {
        width: 40px;
        height: 1px;
        background: var(--gold-light);
        margin: 1.8rem auto;
      }

      .enter-btn {
        display: inline-flex;
        align-items: center;
        gap: 0.6rem;
        margin-top: 0.5rem;
        padding: 1rem 2.8rem;
        background: transparent;
        border: 1px solid var(--gold-light);
        border-radius: 50px;
        color: var(--soft-brown);
        font-family: 'Lato', sans-serif;
        font-weight: 300;
        font-size: 0.72rem;
        letter-spacing: 0.35em;
        text-transform: uppercase;
        text-decoration: none;
        cursor: pointer;
        transition: all 0.4s ease;
      }

      .enter-btn:hover {
        background: var(--soft-brown);
        border-color: var(--soft-brown);
        color: var(--cream);
      }

      .enter-btn svg {
        width: 12px;
        height: 12px;
        fill: currentColor;
        transition: transform 0.3s ease;
      }

      .enter-btn:hover svg {
        transform: scale(1.15);
      }

      /* ====== MUSIC TOGGLE ====== */
      .music-toggle {
        position: fixed;
        bottom: 1.5rem;
        right: 1.5rem;
        z-index: 999;
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.92);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid var(--gold-light);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 2px 16px rgba(61, 50, 41, 0.1);
        transition: all 0.3s ease;
        opacity: 0;
        visibility: hidden;
      }

      .music-toggle.visible {
        opacity: 1;
        visibility: visible;
      }

      .music-toggle:hover {
        transform: scale(1.08);
        box-shadow: 0 4px 20px rgba(61, 50, 41, 0.15);
      }

      .music-bars {
        display: flex;
        align-items: flex-end;
        gap: 2.5px;
        height: 16px;
      }

      .music-bars span {
        display: block;
        width: 2.5px;
        background: var(--gold);
        border-radius: 1px;
        transition: height 0.2s ease;
      }

      .music-bars.playing span:nth-child(1) { animation: bar1 0.6s ease-in-out infinite; }
      .music-bars.playing span:nth-child(2) { animation: bar2 0.5s ease-in-out infinite 0.1s; }
      .music-bars.playing span:nth-child(3) { animation: bar3 0.7s ease-in-out infinite 0.2s; }
      .music-bars.playing span:nth-child(4) { animation: bar4 0.55s ease-in-out infinite 0.05s; }

      .music-bars:not(.playing) span { height: 3px !important; }

      @keyframes bar1 { 0%, 100% { height: 4px; } 50% { height: 14px; } }
      @keyframes bar2 { 0%, 100% { height: 6px; } 50% { height: 12px; } }
      @keyframes bar3 { 0%, 100% { height: 3px; } 50% { height: 16px; } }
      @keyframes bar4 { 0%, 100% { height: 5px; } 50% { height: 10px; } }

      @keyframes welcomeFadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @media (max-width: 480px) {
        .motif-top-right {
          top: -3%;
          right: -5%;
          width: 160px;
        }
        .motif-bottom-left {
          bottom: -3%;
          left: -5%;
          width: 160px;
        }
        .enter-btn {
          padding: 0.9rem 2.2rem;
          font-size: 0.68rem;
        }
        .music-toggle {
          bottom: 1rem;
          right: 1rem;
          width: 40px;
          height: 40px;
        }
      }
    </style>
  </head>
  <body>

    <audio id="bgMusic" preload="auto"></audio>

    <div class="welcome-screen">
      <div class="welcome-bg"></div>

      <div class="motif motif-top-right">
        <img src="https://withjoy.com/assets/public/styles/dev/king_protea/6fa81ef3d810029d609601014e6b12bf24d60e9a6e27300361bc3cf039091127@2x" alt="" />
      </div>
      <div class="motif motif-bottom-left">
        <img src="https://withjoy.com/assets/public/styles/dev/king_protea/6bbd0e77491413b5d2420a685a89b76ecc37b5ee68dd955974648259d172b944@2x" alt="" />
      </div>

      <div class="welcome-content">
        <div class="welcome-dear" id="welcomeDear"></div>
        <div class="welcome-label">the wedding of</div>
        <div class="welcome-names">
          Yasinta
          <span class="welcome-ampersand">&amp;</span>
          Zufar
        </div>
        <div class="divider"></div>
        <a class="enter-btn" id="enterBtn" href="https://withjoy.com/zufar-and-yasinta/" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <polygon points="5,3 19,12 5,21" />
          </svg>
          Open Invitation
        </a>
      </div>
    </div>

    <button class="music-toggle" id="musicToggle" aria-label="Toggle musik">
      <div class="music-bars" id="musicBars">
        <span></span><span></span><span></span><span></span>
      </div>
    </button>

    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var toName = params.get('to');

        // Personalized greeting
        if (toName) {
          var dearEl = document.getElementById('welcomeDear');
          dearEl.textContent = 'Dear ' + toName;
          dearEl.classList.add('visible');
        }

        var enterBtn = document.getElementById('enterBtn');
        var audio = document.getElementById('bgMusic');
        var musicToggle = document.getElementById('musicToggle');
        var musicBars = document.getElementById('musicBars');
        var isPlaying = false;

        // Playlist — add your MP3 files here
        var playlist = [
          'music1.mp3',
          'music2.mp3',
          'music3.mp3',
          'music4.mp3'
        ];
        var currentTrack = 0;

        function loadTrack(index) {
          audio.src = playlist[index];
          audio.load();
        }

        function playTrack() {
          audio.volume = 0.4;
          audio.play().then(function () {
            isPlaying = true;
            musicBars.classList.add('playing');
          }).catch(function () {});
        }

        function randomTrack() {
          if (playlist.length <= 1) return 0;
          var next;
          do {
            next = Math.floor(Math.random() * playlist.length);
          } while (next === currentTrack);
          return next;
        }

        // When a track ends, play a random next one
        audio.addEventListener('ended', function () {
          currentTrack = randomTrack();
          loadTrack(currentTrack);
          playTrack();
        });

        // Start music on click with random track
        enterBtn.addEventListener('click', function () {
          currentTrack = Math.floor(Math.random() * playlist.length);
          loadTrack(currentTrack);
          playTrack();
          musicToggle.classList.add('visible');
        });

        // Music toggle
        musicToggle.addEventListener('click', function () {
          if (isPlaying) {
            audio.pause();
            isPlaying = false;
            musicBars.classList.remove('playing');
          } else {
            audio.play().then(function () {
              isPlaying = true;
              musicBars.classList.add('playing');
            }).catch(function () {});
          }
        });
      })();
    </script>
  </body>
</html>
